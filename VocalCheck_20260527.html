<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ボーカル音域チェッカー</title>
  <style>
    :root{
      --bg:#111;
      --panel:#1b1b1b;
      --line:#333;
      --text:#eee;
      --sub:#aaa;
      --accent:#2d6cdf;
      --whiteW:28px;
      --blackW:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      font-family:sans-serif;
    }
    h1{
      margin:0 0 12px;
      font-size:22px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
    }
    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:8px 0;
    }
    button{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-size:15px;
      color:#fff;
      background:var(--accent);
    }
    button.secondary{ background:#444; }
    button.warn{ background:#9b2c2c; }
    .big{
      font-size:34px;
      font-weight:bold;
      margin-top:6px;
    }
    .sub{
      color:var(--sub);
      font-size:14px;
    }
    .mono{
      font-family:monospace;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .value{
      font-size:24px;
      font-weight:bold;
    }
    .status{
      margin-top:6px;
      font-size:14px;
      color:#9fe870;
    }

    .legend{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
      font-size:13px;
      color:#ddd;
    }
    .legend span{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .dot{
      width:14px;
      height:14px;
      border-radius:4px;
      display:inline-block;
      border:1px solid rgba(255,255,255,.2);
    }
    .dot.current{ background:#ffd45a; }
    .dot.detected{ background:#59a8ff; }
    .dot.span{ background:#d9ffe5; }

    .keyboardWrap{
      overflow-x:auto;
      padding-bottom:6px;
    }
    .keyboard{
      position:relative;
      height:150px;
      user-select:none;
      -webkit-user-select:none;
      margin-top:8px;
    }
    .white-key, .black-key{
      position:absolute;
      border:1px solid #222;
      border-radius:0 0 6px 6px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      font-size:10px;
      padding-bottom:4px;
      transition:.08s linear;
    }
    .white-key{
      width:var(--whiteW);
      height:140px;
      background:#f6f6f6;
      color:#111;
      z-index:1;
    }
    .black-key{
      width:var(--blackW);
      height:88px;
      background:#111;
      color:#fff;
      z-index:2;
      border-color:#000;
    }

    .white-key.span{ background:#d9ffe5; }
    .black-key.span{ background:#2b5d3b; }

    .white-key.detected{ background:#59a8ff; color:#fff; }
    .black-key.detected{ background:#2f79cf; }

    .white-key.current{
      background:#ffd45a;
      color:#111;
      box-shadow:inset 0 0 0 2px #ffb300;
    }
    .black-key.current{
      background:#ffca3a;
      color:#111;
      box-shadow:inset 0 0 0 2px #ffb300;
    }

    .chips{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .chip{
      background:#2a2a2a;
      border:1px solid #444;
      border-radius:999px;
      padding:5px 10px;
      font-size:13px;
    }
  </style>
</head>
<body>
  <h1>ボーカル音域チェッカー</h1>

  <div class="card">
    <div class="row">
      <button id="startBtn">マイク開始</button>
      <button id="measureBtn">測定モード開始</button>
      <button id="clearBtn" class="secondary">記録クリア</button>
    </div>

    <div class="big" id="currentNote">--</div>
    <div class="sub mono" id="currentInfo">Hz: -- / cents: --</div>
    <div class="status" id="measureStatus">待機中</div>
  </div>

  <div class="card grid">
    <div>
      <div class="sub">実測の最低音</div>
      <div class="value" id="lowNote">--</div>
    </div>
    <div>
      <div class="sub">実測の最高音</div>
      <div class="value" id="highNote">--</div>
    </div>
  </div>

  <div class="card">
    <div class="sub">測定した音をピアノ表示</div>
    <div class="legend">
      <span><i class="dot current"></i>現在の音</span>
      <span><i class="dot detected"></i>実際に出た音</span>
      <span><i class="dot span"></i>最低〜最高の範囲</span>
    </div>
    <div class="keyboardWrap">
      <div id="keyboard" class="keyboard"></div>
    </div>
  </div>

  <div class="card">
    <div class="sub">出した音すべて</div>
    <div class="mono" id="rangeText">--</div>
    <div class="chips" id="detectedList"></div>
  </div>

<script>
const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const BLACK_SET = new Set([1,3,6,8,10]);

const START_MIDI = 21;  // A0
const END_MIDI   = 108; // C8
const WHITE_W = 28;
const BLACK_W = 18;

let audioCtx = null;
let analyser = null;
let source = null;
let stream = null;
let timeData = null;
let started = false;
let measuring = false;
let rafId = null;

let currentFreq = null;
let currentMidi = null;

let candidateMidi = null;
let stableFrames = 0;
let missFrames = 0;
let frameCount = 0;

const detectedNotes = new Set();

const startBtn = document.getElementById("startBtn");
const measureBtn = document.getElementById("measureBtn");
const clearBtn = document.getElementById("clearBtn");

const currentNoteEl = document.getElementById("currentNote");
const currentInfoEl = document.getElementById("currentInfo");
const lowNoteEl = document.getElementById("lowNote");
const highNoteEl = document.getElementById("highNote");
const keyboardEl = document.getElementById("keyboard");
const measureStatusEl = document.getElementById("measureStatus");
const rangeTextEl = document.getElementById("rangeText");
const detectedListEl = document.getElementById("detectedList");

function isBlack(midi){
  return BLACK_SET.has(midi % 12);
}
function freqToMidi(freq){
  return Math.round(69 + 12 * Math.log2(freq / 440));
}
function midiToFreq(midi){
  return 440 * Math.pow(2, (midi - 69) / 12);
}
function midiToNote(midi){
  const name = noteNames[(midi % 12 + 12) % 12];
  const octave = Math.floor(midi / 12) - 1;
  return `${name}${octave}`;
}
function centsOff(freq, midi){
  const ref = midiToFreq(midi);
  return Math.round(1200 * Math.log2(freq / ref));
}

function buildKeyboard(){
  keyboardEl.innerHTML = "";
  let whiteIndex = 0;

  for(let midi = START_MIDI; midi <= END_MIDI; midi++){
    const black = isBlack(midi);
    const key = document.createElement("div");
    key.id = `key-${midi}`;
    key.dataset.midi = midi;
    key.className = black ? "black-key" : "white-key";

    if(black){
      key.style.left = `${whiteIndex * WHITE_W - BLACK_W / 2}px`;
    }else{
      key.style.left = `${whiteIndex * WHITE_W}px`;
      if(midi % 12 === 0){ // Cだけラベル
        key.textContent = midiToNote(midi);
      }
      whiteIndex++;
    }

    keyboardEl.appendChild(key);
  }

  keyboardEl.style.width = `${whiteIndex * WHITE_W}px`;
}

function refreshSummary(){
  const arr = [...detectedNotes].sort((a,b) => a - b);

  if(arr.length === 0){
    lowNoteEl.textContent = "--";
    highNoteEl.textContent = "--";
    rangeTextEl.textContent = "--";
    detectedListEl.innerHTML = "";
    updateKeyboard();
    return;
  }

  const low = arr[0];
  const high = arr[arr.length - 1];

  lowNoteEl.textContent = midiToNote(low);
  highNoteEl.textContent = midiToNote(high);
  rangeTextEl.textContent = `実測音域: ${midiToNote(low)} ～ ${midiToNote(high)} / 検出数: ${arr.length}音`;

  detectedListEl.innerHTML = arr
    .map(midi => `<span class="chip">${midiToNote(midi)}</span>`)
    .join("");

  updateKeyboard();
}

function updateKeyboard(){
  const arr = [...detectedNotes].sort((a,b) => a - b);
  const low = arr.length ? arr[0] : null;
  const high = arr.length ? arr[arr.length - 1] : null;

  for(let midi = START_MIDI; midi <= END_MIDI; midi++){
    const key = document.getElementById(`key-${midi}`);
    if(!key) continue;

    key.classList.remove("span", "detected", "current");

    if(low !== null && midi >= low && midi <= high){
      key.classList.add("span");
    }
    if(detectedNotes.has(midi)){
      key.classList.add("detected");
    }
    if(currentMidi === midi){
      key.classList.add("current");
    }
  }
}

function clearCurrentDisplay(){
  currentFreq = null;
  currentMidi = null;
  currentNoteEl.textContent = "--";
  currentInfoEl.textContent = "Hz: -- / cents: --";
  updateKeyboard();
}

function clearDetected(){
  detectedNotes.clear();
  refreshSummary();
}

function registerCurrentMidi(midi){
  if(!measuring || midi == null) return;
  detectedNotes.add(midi);
  refreshSummary();
}

function setMeasureUI(){
  measureBtn.textContent = measuring ? "測定モード停止" : "測定モード開始";
  measureStatusEl.textContent = measuring ? "測定中：出した音をすべて記録します" : "待機中";
}

async function startAudio(){
  if(started) return;

  stream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:false,
      noiseSuppression:false,
      autoGainControl:false
    }
  });

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();

  source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.75;

  source.connect(analyser);

  timeData = new Float32Array(analyser.fftSize);
  started = true;

  if(!rafId) loop();
}

async function toggleMeasure(){
  if(!started){
    await startAudio();
  }

  if(!measuring){
    clearDetected(); // 新しい測定として開始
    measuring = true;
  }else{
    measuring = false;
  }
  setMeasureUI();
}

function autoCorrelate(buf, sampleRate){
  let SIZE = buf.length;
  let rms = 0;

  for(let i=0;i<SIZE;i++){
    const v = buf[i];
    rms += v * v;
  }
  rms = Math.sqrt(rms / SIZE);
  if(rms < 0.01) return -1;

  let r1 = 0;
  let r2 = SIZE - 1;
  const threshold = 0.2;

  for(let i=0;i<SIZE/2;i++){
    if(Math.abs(buf[i]) < threshold){ r1 = i; break; }
  }
  for(let i=1;i<SIZE/2;i++){
    if(Math.abs(buf[SIZE - i]) < threshold){ r2 = SIZE - i; break; }
  }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  const c = new Array(SIZE).fill(0);
  for(let lag=0; lag<SIZE; lag++){
    for(let i=0; i<SIZE-lag; i++){
      c[lag] += buf[i] * buf[i + lag];
    }
  }

  let d = 0;
  while(d + 1 < SIZE && c[d] > c[d + 1]) d++;

  let maxVal = -1;
  let maxPos = -1;
  for(let i=d; i<SIZE; i++){
    if(c[i] > maxVal){
      maxVal = c[i];
      maxPos = i;
    }
  }
  if(maxPos <= 0) return -1;

  let T0 = maxPos;
  const x1 = c[T0 - 1] || c[T0];
  const x2 = c[T0];
  const x3 = c[T0 + 1] || c[T0];
  const a = (x1 + x3 - 2 * x2) / 2;
  const b = (x3 - x1) / 2;
  if(a) T0 = T0 - b / (2 * a);

  const freq = sampleRate / T0;
  if(freq < 60 || freq > 1400) return -1;

  return freq;
}

function loop(){
  rafId = requestAnimationFrame(loop);
  if(!analyser) return;

  frameCount++;
  if(frameCount % 2 !== 0) return; // 少し軽量化

  analyser.getFloatTimeDomainData(timeData);
  const freq = autoCorrelate(timeData, audioCtx.sampleRate);

  if(freq === -1){
    candidateMidi = null;
    stableFrames = 0;
    missFrames++;

    if(missFrames > 4){
      clearCurrentDisplay();
    }
    return;
  }

  missFrames = 0;

  const midi = freqToMidi(freq);

  if(candidateMidi === midi){
    stableFrames++;
  }else{
    candidateMidi = midi;
    stableFrames = 1;
  }

  if(stableFrames < 3) return; // 安定したときだけ採用

  currentFreq = freq;
  currentMidi = midi;

  const note = midiToNote(midi);
  const cents = centsOff(freq, midi);

  currentNoteEl.textContent = note;
  currentInfoEl.textContent = `Hz: ${freq.toFixed(1)} / cents: ${cents > 0 ? "+" : ""}${cents}`;

  registerCurrentMidi(midi);
  updateKeyboard();
}

startBtn.addEventListener("click", async () => {
  try{
    await startAudio();
    measureStatusEl.textContent = measuring ? "測定中：出した音をすべて記録します" : "マイク開始済み";
  }catch(err){
    alert("マイク開始に失敗しました: " + err.message);
  }
});

measureBtn.addEventListener("click", async () => {
  try{
    await toggleMeasure();
  }catch(err){
    alert("測定モード開始に失敗しました: " + err.message);
  }
});

clearBtn.addEventListener("click", () => {
  clearDetected();
});

buildKeyboard();
setMeasureUI();
refreshSummary();
</script>
</body>
</html>
